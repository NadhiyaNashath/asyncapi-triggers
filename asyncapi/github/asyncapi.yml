  schemas:

    # -----------------------------------------------------------------------
    # Delivery headers present on every GitHub webhook POST request
    # -----------------------------------------------------------------------
    WebhookHeaders:
      type: object
      required:
        - X-GitHub-Event
        - X-GitHub-Delivery
        - X-GitHub-Hook-ID
      properties:
        X-GitHub-Event:
          type: string
          description: The name of the event that triggered the delivery
          examples:
            - push
            - pull_request
            - issues
        X-GitHub-Delivery:
          type: string
          format: uuid
          description: A globally unique identifier (GUID) for this delivery
        X-GitHub-Hook-ID:
          type: integer
          description: The unique identifier of the webhook
        X-GitHub-Hook-Installation-Target-ID:
          type: integer
          description: The unique identifier of the resource where the webhook was created
        X-GitHub-Hook-Installation-Target-Type:
          type: string
          description: The type of resource where the webhook was created
          enum:
            - repository
            - organization
            - app
            - business
            - marketplace
        X-Hub-Signature:
          type: string
          description: |
            HMAC hex digest of the request body using SHA-1. Sent only when a
            webhook secret is configured. Use X-Hub-Signature-256 instead.
        X-Hub-Signature-256:
          type: string
          description: |
            HMAC hex digest of the request body using SHA-256. Sent only when
            a webhook secret is configured. Preferred over X-Hub-Signature.
        User-Agent:
          type: string
          description: Always has the prefix GitHub-Hookshot/
          examples:
            - GitHub-Hookshot/044aadd

    # -----------------------------------------------------------------------
    # Common reusable object schemas
    # -----------------------------------------------------------------------

    User:
      type: object
      description: A GitHub user
      required:
        - login
        - id
      properties:
        login:
          type: string
          description: The user's GitHub username
        id:
          type: integer
          description: The user's unique numeric identifier
        node_id:
          type: string
        avatar_url:
          type: string
          format: uri
        gravatar_id:
          type: string
          nullable: true
        url:
          type: string
          format: uri
        html_url:
          type: string
          format: uri
        type:
          type: string
          enum:
            - User
            - Bot
            - Organization
        site_admin:
          type: boolean

    Repository:
      type: object
      description: A repository on GitHub
      required:
        - id
        - name
        - full_name
        - owner
        - private
      properties:
        id:
          type: integer
        node_id:
          type: string
        name:
          type: string
          description: The repository name
        full_name:
          type: string
          description: The full repository name including owner (e.g. octocat/Hello-World)
        owner:
          $ref: '#/components/schemas/User'
        private:
          type: boolean
          description: Whether the repository is private
        html_url:
          type: string
          format: uri
        description:
          type: string
          nullable: true
        fork:
          type: boolean
        url:
          type: string
          format: uri
        homepage:
          type: string
          nullable: true
        language:
          type: string
          nullable: true
        forks_count:
          type: integer
        stargazers_count:
          type: integer
        watchers_count:
          type: integer
        size:
          type: integer
        default_branch:
          type: string
        open_issues_count:
          type: integer
        topics:
          type: array
          items:
            type: string
        has_issues:
          type: boolean
        has_projects:
          type: boolean
        has_wiki:
          type: boolean
        has_pages:
          type: boolean
        has_downloads:
          type: boolean
        archived:
          type: boolean
        disabled:
          type: boolean
        visibility:
          type: string
          enum:
            - public
            - private
            - internal
        pushed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        license:
          type: object
          nullable: true
          properties:
            key:
              type: string
            name:
              type: string
            spdx_id:
              type: string
            url:
              type: string
              nullable: true

    Organization:
      type: object
      description: A GitHub organization
      properties:
        login:
          type: string
        id:
          type: integer
        node_id:
          type: string
        url:
          type: string
          format: uri
        html_url:
          type: string
          format: uri
        repos_url:
          type: string
          format: uri
        avatar_url:
          type: string
          format: uri
        description:
          type: string
          nullable: true

    Installation:
      type: object
      description: A GitHub App installation
      properties:
        id:
          type: integer
        node_id:
          type: string

    Enterprise:
      type: object
      description: A GitHub Enterprise account
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        node_id:
          type: string
        avatar_url:
          type: string
          format: uri
        description:
          type: string
          nullable: true
        website_url:
          type: string
          nullable: true
        html_url:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # Common payload fields present on most webhook events
    CommonPayload:
      type: object
      properties:
        sender:
          $ref: '#/components/schemas/User'
        repository:
          $ref: '#/components/schemas/Repository'
        organization:
          $ref: '#/components/schemas/Organization'
        installation:
          $ref: '#/components/schemas/Installation'
        enterprise:
          $ref: '#/components/schemas/Enterprise'

    Label:
      type: object
      description: A label on an issue or pull request
      required:
        - id
        - name
        - color
      properties:
        id:
          type: integer
        node_id:
          type: string
        url:
          type: string
          format: uri
        name:
          type: string
        color:
          type: string
          description: 6-character hex color code
        default:
          type: boolean
        description:
          type: string
          nullable: true

    Milestone:
      type: object
      nullable: true
      description: A milestone on an issue or pull request
      properties:
        id:
          type: integer
        node_id:
          type: string
        number:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        state:
          type: string
          enum:
            - open
            - closed
        open_issues:
          type: integer
        closed_issues:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        due_on:
          type: string
          format: date-time
          nullable: true
        closed_at:
          type: string
          format: date-time
          nullable: true
        creator:
          $ref: '#/components/schemas/User'

    Issue:
      type: object
      description: An issue on GitHub
      required:
        - id
        - number
        - title
        - state
      properties:
        id:
          type: integer
        node_id:
          type: string
        url:
          type: string
          format: uri
        html_url:
          type: string
          format: uri
        number:
          type: integer
        title:
          type: string
        body:
          type: string
          nullable: true
        state:
          type: string
          enum:
            - open
            - closed
        locked:
          type: boolean
        user:
          $ref: '#/components/schemas/User'
        labels:
          type: array
          items:
            $ref: '#/components/schemas/Label'
        assignee:
          $ref: '#/components/schemas/User'
          nullable: true
        assignees:
          type: array
          items:
            $ref: '#/components/schemas/User'
        milestone:
          $ref: '#/components/schemas/Milestone'
        comments:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        closed_at:
          type: string
          format: date-time
          nullable: true
        author_association:
          type: string
          enum:
            - COLLABORATOR
            - CONTRIBUTOR
            - FIRST_TIMER
            - FIRST_TIME_CONTRIBUTOR
            - MANNEQUIN
            - MEMBER
            - NONE
            - OWNER
        active_lock_reason:
          type: string
          nullable: true

    PullRequestRef:
      type: object
      description: A pull request head or base ref
      properties:
        label:
          type: string
        ref:
          type: string
        sha:
          type: string
        user:
          $ref: '#/components/schemas/User'
        repo:
          $ref: '#/components/schemas/Repository'

    PullRequest:
      type: object
      description: A pull request
      required:
        - id
        - number
        - state
        - title
      properties:
        id:
          type: integer
        node_id:
          type: string
        url:
          type: string
          format: uri
        html_url:
          type: string
          format: uri
        diff_url:
          type: string
          format: uri
        patch_url:
          type: string
          format: uri
        number:
          type: integer
        state:
          type: string
          enum:
            - open
            - closed
        locked:
          type: boolean
        title:
          type: string
        body:
          type: string
          nullable: true
        user:
          $ref: '#/components/schemas/User'
        labels:
          type: array
          items:
            $ref: '#/components/schemas/Label'
        assignee:
          $ref: '#/components/schemas/User'
          nullable: true
        assignees:
          type: array
          items:
            $ref: '#/components/schemas/User'
        milestone:
          $ref: '#/components/schemas/Milestone'
        head:
          $ref: '#/components/schemas/PullRequestRef'
        base:
          $ref: '#/components/schemas/PullRequestRef'
        draft:
          type: boolean
        merged:
          type: boolean
          nullable: true
        mergeable:
          type: boolean
          nullable: true
        rebaseable:
          type: boolean
          nullable: true
        mergeable_state:
          type: string
        merge_commit_sha:
          type: string
          nullable: true
        comments:
          type: integer
        review_comments:
          type: integer
        commits:
          type: integer
        additions:
          type: integer
        deletions:
          type: integer
        changed_files:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        closed_at:
          type: string
          format: date-time
          nullable: true
        merged_at:
          type: string
          format: date-time
          nullable: true
        merged_by:
          $ref: '#/components/schemas/User'
          nullable: true
        author_association:
          type: string
          enum:
            - COLLABORATOR
            - CONTRIBUTOR
            - FIRST_TIMER
            - FIRST_TIME_CONTRIBUTOR
            - MANNEQUIN
            - MEMBER
            - NONE
            - OWNER
        auto_merge:
          type: object
          nullable: true

    Release:
      type: object
      description: A GitHub release
      required:
        - id
        - tag_name
        - name
      properties:
        id:
          type: integer
        node_id:
          type: string
        url:
          type: string
          format: uri
        html_url:
          type: string
          format: uri
        assets_url:
          type: string
          format: uri
        upload_url:
          type: string
        tag_name:
          type: string
        name:
          type: string
          nullable: true
        body:
          type: string
          nullable: true
        draft:
          type: boolean
        prerelease:
          type: boolean
        target_commitish:
          type: string
        author:
          $ref: '#/components/schemas/User'
        assets:
          type: array
          items:
            type: object
        created_at:
          type: string
          format: date-time
        published_at:
          type: string
          format: date-time
          nullable: true

    CommitAuthor:
      type: object
      description: Git author/committer metadata
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        username:
          type: string

    Commit:
      type: object
      description: A Git commit
      required:
        - id
        - message
      properties:
        id:
          type: string
          description: The commit SHA
        tree_id:
          type: string
        distinct:
          type: boolean
          description: Whether this commit is distinct from any that have been pushed before
        message:
          type: string
        timestamp:
          type: string
          format: date-time
        url:
          type: string
          format: uri
        author:
          $ref: '#/components/schemas/CommitAuthor'
        committer:
          $ref: '#/components/schemas/CommitAuthor'
        added:
          type: array
          description: Files added in this commit
          items:
            type: string
        removed:
          type: array
          description: Files removed in this commit
          items:
            type: string
        modified:
          type: array
          description: Files modified in this commit
          items:
            type: string

    IssueComment:
      type: object
      description: A comment on an issue or pull request
      required:
        - id
        - body
      properties:
        id:
          type: integer
        node_id:
          type: string
        url:
          type: string
          format: uri
        html_url:
          type: string
          format: uri
        body:
          type: string
        user:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        author_association:
          type: string

    PullRequestReview:
      type: object
      description: A pull request review
      required:
        - id
        - state
      properties:
        id:
          type: integer
        node_id:
          type: string
        user:
          $ref: '#/components/schemas/User'
        body:
          type: string
          nullable: true
        state:
          type: string
          enum:
            - APPROVED
            - CHANGES_REQUESTED
            - COMMENTED
            - DISMISSED
            - PENDING
        html_url:
          type: string
          format: uri
        pull_request_url:
          type: string
          format: uri
        submitted_at:
          type: string
          format: date-time
        commit_id:
          type: string
        author_association:
          type: string

    PullRequestReviewComment:
      type: object
      description: A comment on a pull request diff
      required:
        - id
        - body
      properties:
        id:
          type: integer
        node_id:
          type: string
        pull_request_review_id:
          type: integer
          nullable: true
        url:
          type: string
          format: uri
        html_url:
          type: string
          format: uri
        body:
          type: string
        diff_hunk:
          type: string
        path:
          type: string
        position:
          type: integer
          nullable: true
        original_position:
          type: integer
        commit_id:
          type: string
        original_commit_id:
          type: string
        user:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        author_association:
          type: string
        side:
          type: string
          enum:
            - LEFT
            - RIGHT
        start_side:
          type: string
          enum:
            - LEFT
            - RIGHT
          nullable: true

    CheckRun:
      type: object
      description: A check performed on the code of a given code change
      required:
        - id
        - name
      properties:
        id:
          type: integer
        name:
          type: string
        node_id:
          type: string
        head_sha:
          type: string
        external_id:
          type: string
          nullable: true
        url:
          type: string
          format: uri
        html_url:
          type: string
          format: uri
        details_url:
          type: string
          format: uri
          nullable: true
        status:
          type: string
          enum:
            - queued
            - in_progress
            - completed
            - waiting
            - pending
        conclusion:
          type: string
          nullable: true
          enum:
            - action_required
            - cancelled
            - failure
            - neutral
            - skipped
            - stale
            - startup_failure
            - success
            - timed_out
            - 
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        output:
          type: object
          properties:
            title:
              type: string
              nullable: true
            summary:
              type: string
              nullable: true
            text:
              type: string
              nullable: true
            annotations_count:
              type: integer
            annotations_url:
              type: string
              format: uri
        check_suite:
          type: object
          properties:
            id:
              type: integer
        app:
          type: object
        pull_requests:
          type: array
          items:
            type: object

    CheckSuite:
      type: object
      description: A check suite
      required:
        - id
      properties:
        id:
          type: integer
        node_id:
          type: string
        head_branch:
          type: string
          nullable: true
        head_sha:
          type: string
        status:
          type: string
          enum:
            - queued
            - in_progress
            - completed
        conclusion:
          type: string
          nullable: true
          enum:
            - action_required
            - cancelled
            - failure
            - neutral
            - skipped
            - stale
            - success
            - timed_out
            - 
        url:
          type: string
          format: uri
        before:
          type: string
          nullable: true
        after:
          type: string
          nullable: true
        pull_requests:
          type: array
          items:
            type: object
        app:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Deployment:
      type: object
      description: A deployment request for a specific ref
      required:
        - id
        - ref
        - sha
        - task
        - environment
      properties:
        id:
          type: integer
        node_id:
          type: string
        sha:
          type: string
        ref:
          type: string
        task:
          type: string
        payload:
          type: object
        original_environment:
          type: string
        environment:
          type: string
        description:
          type: string
          nullable: true
        creator:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        statuses_url:
