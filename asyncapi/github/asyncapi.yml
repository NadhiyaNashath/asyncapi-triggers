asyncapi: 3.0.0

info:
  title: GitHub Webhooks API
  version: 1.0.0
  description: |
    AsyncAPI specification for GitHub Webhook events. GitHub delivers webhook
    payloads via HTTP POST to a configured endpoint URL. Each event is identified
    by the `X-GitHub-Event` request header.

    Payloads are capped at 25 MB. Common payload parameters (sender, repository,
    organization, installation, enterprise) are included on every applicable event.

    Reference: https://docs.github.com/en/webhooks/webhook-events-and-payloads
  license:
    name: GitHub Docs License
    url: https://docs.github.com/en/site-policy/github-terms/github-terms-for-additional-products-and-features

x-ballerina-event-identifier:
  type: "header"
  name: "X-GitHub-Event"
  path: "action"

x-ballerina-auth:
  header: "X-Hub-Signature-256"

# ---------------------------------------------------------------------------
# Channels — one per event type; all share the same webhook endpoint address.
# The X-GitHub-Event header on each message discriminates the event type.
# ---------------------------------------------------------------------------
channels:

  ping:
    address: /
    description: |
      Fired when a new webhook is created. Confirms the webhook was configured
      correctly. Available on repository, organization, app, business, and
      marketplace webhooks.
    messages:
      pingMessage:
        $ref: '#/components/messages/PingMessage'
    bindings:
      http:
        method: POST

  push:
    address: /
    description: |
      Fired when a commit, branch, or tag is pushed to a repository. Also fires
      when a repository is created from a template. Available on repository,
      organization, and app webhooks.
    messages:
      pushMessage:
        $ref: '#/components/messages/PushMessage'
    bindings:
      http:
        method: POST

  pullRequest:
    address: /
    description: |
      Fired when there is activity on a pull request. Actions: assigned,
      auto_merge_disabled, auto_merge_enabled, closed, converted_to_draft,
      demilestoned, dequeued, edited, enqueued, labeled, locked, milestoned,
      opened, ready_for_review, reopened, review_request_removed,
      review_requested, synchronize, unassigned, unlabeled, unlocked.
      Available on repository, organization, and app webhooks.
    messages:
      pullRequestAssigned:
        $ref: '#/components/messages/PullRequestAssignedMessage'
      pullRequestAutoMergeDisabled:
        $ref: '#/components/messages/PullRequestAutoMergeDisabledMessage'
      pullRequestAutoMergeEnabled:
        $ref: '#/components/messages/PullRequestAutoMergeEnabledMessage'
      pullRequestClosed:
        $ref: '#/components/messages/PullRequestClosedMessage'
      pullRequestConvertedToDraft:
        $ref: '#/components/messages/PullRequestConvertedToDraftMessage'
      pullRequestDemilestoned:
        $ref: '#/components/messages/PullRequestDemilestonedMessage'
      pullRequestDequeued:
        $ref: '#/components/messages/PullRequestDequeuedMessage'
      pullRequestEdited:
        $ref: '#/components/messages/PullRequestEditedMessage'
      pullRequestEnqueued:
        $ref: '#/components/messages/PullRequestEnqueuedMessage'
      pullRequestLabeled:
        $ref: '#/components/messages/PullRequestLabeledMessage'
      pullRequestLocked:
        $ref: '#/components/messages/PullRequestLockedMessage'
      pullRequestMilestoned:
        $ref: '#/components/messages/PullRequestMilestonedMessage'
      pullRequestOpened:
        $ref: '#/components/messages/PullRequestOpenedMessage'
      pullRequestReadyForReview:
        $ref: '#/components/messages/PullRequestReadyForReviewMessage'
      pullRequestReopened:
        $ref: '#/components/messages/PullRequestReopenedMessage'
      pullRequestReviewRequestRemoved:
        $ref: '#/components/messages/PullRequestReviewRequestRemovedMessage'
      pullRequestReviewRequested:
        $ref: '#/components/messages/PullRequestReviewRequestedMessage'
      pullRequestSynchronize:
        $ref: '#/components/messages/PullRequestSynchronizeMessage'
      pullRequestUnassigned:
        $ref: '#/components/messages/PullRequestUnassignedMessage'
      pullRequestUnlabeled:
        $ref: '#/components/messages/PullRequestUnlabeledMessage'
      pullRequestUnlocked:
        $ref: '#/components/messages/PullRequestUnlockedMessage'
    bindings:
      http:
        method: POST

  issues:
    address: /
    description: |
      Fired when there is activity on an issue. Actions: assigned, closed,
      deleted, demilestoned, edited, labeled, locked, milestoned, opened,
      pinned, reopened, transferred, typed, unassigned, unlabeled, unlocked,
      unpinned, untyped. Available on repository, organization, and app webhooks.
    messages:
      issuesAssigned:
        $ref: '#/components/messages/IssuesAssignedMessage'
      issuesClosed:
        $ref: '#/components/messages/IssuesClosedMessage'
      issuesDeleted:
        $ref: '#/components/messages/IssuesDeletedMessage'
      issuesDemilestoned:
        $ref: '#/components/messages/IssuesDemilestonedMessage'
      issuesEdited:
        $ref: '#/components/messages/IssuesEditedMessage'
      issuesLabeled:
        $ref: '#/components/messages/IssuesLabeledMessage'
      issuesLocked:
        $ref: '#/components/messages/IssuesLockedMessage'
      issuesMilestoned:
        $ref: '#/components/messages/IssuesMilestonedMessage'
      issuesOpened:
        $ref: '#/components/messages/IssuesOpenedMessage'
      issuesPinned:
        $ref: '#/components/messages/IssuesPinnedMessage'
      issuesReopened:
        $ref: '#/components/messages/IssuesReopenedMessage'
      issuesTransferred:
        $ref: '#/components/messages/IssuesTransferredMessage'
      issuesTyped:
        $ref: '#/components/messages/IssuesTypedMessage'
      issuesUnassigned:
        $ref: '#/components/messages/IssuesUnassignedMessage'
      issuesUnlabeled:
        $ref: '#/components/messages/IssuesUnlabeledMessage'
      issuesUnlocked:
        $ref: '#/components/messages/IssuesUnlockedMessage'
      issuesUnpinned:
        $ref: '#/components/messages/IssuesUnpinnedMessage'
      issuesUntyped:
        $ref: '#/components/messages/IssuesUntypedMessage'
    bindings:
      http:
        method: POST

  release:
    address: /
    description: |
      Fired when there is activity on a release. Actions: created, deleted,
      edited, prereleased, published, released, unpublished.
      Available on repository, organization, and app webhooks.
    messages:
      releaseCreated:
        $ref: '#/components/messages/ReleaseCreatedMessage'
      releaseDeleted:
        $ref: '#/components/messages/ReleaseDeletedMessage'
      releaseEdited:
        $ref: '#/components/messages/ReleaseEditedMessage'
      releasePrereleased:
        $ref: '#/components/messages/ReleasePrereleasedMessage'
      releasePublished:
        $ref: '#/components/messages/ReleasePublishedMessage'
      releaseReleased:
        $ref: '#/components/messages/ReleaseReleasedMessage'
      releaseUnpublished:
        $ref: '#/components/messages/ReleaseUnpublishedMessage'
    bindings:
      http:
        method: POST

  issueComment:
    address: /
    description: |
      Fired when a comment on an issue or pull request is created, deleted,
      edited, pinned, or unpinned. Available on repository, organization,
      and app webhooks.
    messages:
      issueCommentCreated:
        $ref: '#/components/messages/IssueCommentCreatedMessage'
      issueCommentDeleted:
        $ref: '#/components/messages/IssueCommentDeletedMessage'
      issueCommentEdited:
        $ref: '#/components/messages/IssueCommentEditedMessage'
      issueCommentPinned:
        $ref: '#/components/messages/IssueCommentPinnedMessage'
      issueCommentUnpinned:
        $ref: '#/components/messages/IssueCommentUnpinnedMessage'
    bindings:
      http:
        method: POST

  pullRequestReview:
    address: /
    description: |
      Fired when a pull request review is dismissed, edited, or submitted.
      Available on repository, organization, and app webhooks.
    messages:
      pullRequestReviewDismissed:
        $ref: '#/components/messages/PullRequestReviewDismissedMessage'
      pullRequestReviewEdited:
        $ref: '#/components/messages/PullRequestReviewEditedMessage'
      pullRequestReviewSubmitted:
        $ref: '#/components/messages/PullRequestReviewSubmittedMessage'
    bindings:
      http:
        method: POST

  pullRequestReviewComment:
    address: /
    description: |
      Fired when a pull request diff comment is created, deleted, or edited.
      Available on repository, organization, and app webhooks.
    messages:
      pullRequestReviewCommentCreated:
        $ref: '#/components/messages/PullRequestReviewCommentCreatedMessage'
      pullRequestReviewCommentDeleted:
        $ref: '#/components/messages/PullRequestReviewCommentDeletedMessage'
      pullRequestReviewCommentEdited:
        $ref: '#/components/messages/PullRequestReviewCommentEditedMessage'
    bindings:
      http:
        method: POST

  create:
    address: /
    description: |
      Fired when a Git branch or tag is created (up to three tags at once).
      Available on repository, organization, and app webhooks.
    messages:
      createMessage:
        $ref: '#/components/messages/CreateMessage'
    bindings:
      http:
        method: POST

  delete:
    address: /
    description: |
      Fired when a Git branch or tag is deleted (up to three tags at once).
      Available on repository, organization, and app webhooks.
    messages:
      deleteMessage:
        $ref: '#/components/messages/DeleteMessage'
    bindings:
      http:
        method: POST

  fork:
    address: /
    description: |
      Fired when a repository is forked. Available on business, repository,
      organization, and app webhooks.
    messages:
      forkMessage:
        $ref: '#/components/messages/ForkMessage'
    bindings:
      http:
        method: POST

  star:
    address: /
    description: |
      Fired when a repository is starred or unstarred. Actions: created, deleted.
      Available on repository, organization, and app webhooks.
    messages:
      starCreated:
        $ref: '#/components/messages/StarCreatedMessage'
      starDeleted:
        $ref: '#/components/messages/StarDeletedMessage'
    bindings:
      http:
        method: POST

  watch:
    address: /
    description: |
      Fired when someone starts watching (subscribing to) a repository.
      Available on repository, organization, and app webhooks.
    messages:
      watchMessage:
        $ref: '#/components/messages/WatchMessage'
    bindings:
      http:
        method: POST

  checkRun:
    address: /
    description: |
      Fired when there is activity on a check run. Actions: completed, created,
      requested_action, rerequested. Repository and organization webhooks only
      receive created and completed actions. Available on repository,
      organization, and app webhooks.
    messages:
      checkRunCompleted:
        $ref: '#/components/messages/CheckRunCompletedMessage'
      checkRunCreated:
        $ref: '#/components/messages/CheckRunCreatedMessage'
      checkRunRequestedAction:
        $ref: '#/components/messages/CheckRunRequestedActionMessage'
      checkRunRerequested:
        $ref: '#/components/messages/CheckRunRerequestedMessage'
    bindings:
      http:
        method: POST

  checkSuite:
    address: /
    description: |
      Fired when there is activity on a check suite. Actions: completed,
      requested, rerequested. Repository and organization webhooks only receive
      the completed action. Available on repository, organization, and app webhooks.
    messages:
      checkSuiteCompleted:
        $ref: '#/components/messages/CheckSuiteCompletedMessage'
      checkSuiteRequested:
        $ref: '#/components/messages/CheckSuiteRequestedMessage'
      checkSuiteRerequested:
        $ref: '#/components/messages/CheckSuiteRerequestedMessage'
    bindings:
      http:
        method: POST

  deployment:
    address: /
    description: |
      Fired when a deployment is created. Available on repository, organization,
      and app webhooks.
    messages:
      deploymentMessage:
        $ref: '#/components/messages/DeploymentMessage'
    bindings:
      http:
        method: POST

  deploymentStatus:
    address: /
    description: |
      Fired when a new deployment status is created. Not fired for deployments
      with an inactive state. Available on repository, organization, and app
      webhooks.
    messages:
      deploymentStatusMessage:
        $ref: '#/components/messages/DeploymentStatusMessage'
    bindings:
      http:
        method: POST

  workflowRun:
    address: /
    description: |
      Fired when a GitHub Actions workflow run is completed, in_progress, or
      requested. Available on business, repository, organization, and app webhooks.
    messages:
      workflowRunCompleted:
        $ref: '#/components/messages/WorkflowRunCompletedMessage'
      workflowRunInProgress:
        $ref: '#/components/messages/WorkflowRunInProgressMessage'
      workflowRunRequested:
        $ref: '#/components/messages/WorkflowRunRequestedMessage'
    bindings:
      http:
        method: POST

  workflowJob:
    address: /
    description: |
      Fired when there is activity on a GitHub Actions workflow job. Actions:
      completed, in_progress, queued, waiting. Available on business, repository,
      organization, and app webhooks.
    messages:
      workflowJobCompleted:
        $ref: '#/components/messages/WorkflowJobCompletedMessage'
      workflowJobInProgress:
        $ref: '#/components/messages/WorkflowJobInProgressMessage'
      workflowJobQueued:
        $ref: '#/components/messages/WorkflowJobQueuedMessage'
      workflowJobWaiting:
        $ref: '#/components/messages/WorkflowJobWaitingMessage'
    bindings:
      http:
        method: POST

  repository:
    address: /
    description: |
      Fired when there is activity on a repository. Actions: archived, created,
      deleted, edited, privatized, publicized, renamed, transferred, unarchived.
      Available on business, repository, organization, and app webhooks.
    messages:
      repositoryArchived:
        $ref: '#/components/messages/RepositoryArchivedMessage'
      repositoryCreated:
        $ref: '#/components/messages/RepositoryCreatedMessage'
      repositoryDeleted:
        $ref: '#/components/messages/RepositoryDeletedMessage'
      repositoryEdited:
        $ref: '#/components/messages/RepositoryEditedMessage'
      repositoryPrivatized:
        $ref: '#/components/messages/RepositoryPrivatizedMessage'
      repositoryPublicized:
        $ref: '#/components/messages/RepositoryPublicizedMessage'
      repositoryRenamed:
        $ref: '#/components/messages/RepositoryRenamedMessage'
      repositoryTransferred:
        $ref: '#/components/messages/RepositoryTransferredMessage'
      repositoryUnarchived:
        $ref: '#/components/messages/RepositoryUnarchivedMessage'
    bindings:
      http:
        method: POST

  member:
    address: /
    description: |
      Fired when there is activity relating to repository collaborators.
      Actions: added, edited, removed. Available on business, repository,
      organization, and app webhooks.
    messages:
      memberAdded:
        $ref: '#/components/messages/MemberAddedMessage'
      memberEdited:
        $ref: '#/components/messages/MemberEditedMessage'
      memberRemoved:
        $ref: '#/components/messages/MemberRemovedMessage'
    bindings:
      http:
        method: POST

  discussion:
    address: /
    description: |
      Fired when there is activity relating to a discussion. Actions: answered,
      category_changed, closed, created, deleted, edited, labeled, locked,
      pinned, reopened, transferred, unanswered, unlabeled, unlocked, unpinned.
      Available on repository, organization, and app webhooks.
      Note: GitHub Discussions webhooks are in public preview.
    messages:
      discussionAnswered:
        $ref: '#/components/messages/DiscussionAnsweredMessage'
      discussionCategoryChanged:
        $ref: '#/components/messages/DiscussionCategoryChangedMessage'
      discussionClosed:
        $ref: '#/components/messages/DiscussionClosedMessage'
      discussionCreated:
        $ref: '#/components/messages/DiscussionCreatedMessage'
      discussionDeleted:
        $ref: '#/components/messages/DiscussionDeletedMessage'
      discussionEdited:
        $ref: '#/components/messages/DiscussionEditedMessage'
      discussionLabeled:
        $ref: '#/components/messages/DiscussionLabeledMessage'
      discussionLocked:
        $ref: '#/components/messages/DiscussionLockedMessage'
      discussionPinned:
        $ref: '#/components/messages/DiscussionPinnedMessage'
      discussionReopened:
        $ref: '#/components/messages/DiscussionReopenedMessage'
      discussionTransferred:
        $ref: '#/components/messages/DiscussionTransferredMessage'
      discussionUnanswered:
        $ref: '#/components/messages/DiscussionUnansweredMessage'
      discussionUnlabeled:
        $ref: '#/components/messages/DiscussionUnlabeledMessage'
      discussionUnlocked:
        $ref: '#/components/messages/DiscussionUnlockedMessage'
      discussionUnpinned:
        $ref: '#/components/messages/DiscussionUnpinnedMessage'
    bindings:
      http:
        method: POST

  discussionComment:
    address: /
    description: |
      Fired when there is activity relating to a comment on a discussion.
      Actions: created, deleted, edited. Available on repository, organization,
      and app webhooks. Note: GitHub Discussions webhooks are in public preview.
    messages:
      discussionCommentCreated:
        $ref: '#/components/messages/DiscussionCommentCreatedMessage'
      discussionCommentDeleted:
        $ref: '#/components/messages/DiscussionCommentDeletedMessage'
      discussionCommentEdited:
        $ref: '#/components/messages/DiscussionCommentEditedMessage'
    bindings:
      http:
        method: POST

  label:
    address: /
    description: |
      Fired when there is activity relating to labels. Actions: created,
      deleted, edited. Available on repository, organization, and app webhooks.
    messages:
      labelCreated:
        $ref: '#/components/messages/LabelCreatedMessage'
      labelDeleted:
        $ref: '#/components/messages/LabelDeletedMessage'
      labelEdited:
        $ref: '#/components/messages/LabelEditedMessage'
    bindings:
      http:
        method: POST

  milestone:
    address: /
    description: |
      Fired when there is activity relating to milestones. Actions: closed,
      created, deleted, edited, opened. Available on repository, organization,
      and app webhooks.
    messages:
      milestoneClosed:
        $ref: '#/components/messages/MilestoneClosedMessage'
      milestoneCreated:
        $ref: '#/components/messages/MilestoneCreatedMessage'
      milestoneDeleted:
        $ref: '#/components/messages/MilestoneDeletedMessage'
      milestoneEdited:
        $ref: '#/components/messages/MilestoneEditedMessage'
      milestoneOpened:
        $ref: '#/components/messages/MilestoneOpenedMessage'
    bindings:
      http:
        method: POST

  status:
    address: /
    description: |
      Fired when the status of a Git commit changes (error, failure, pending,
      success). No action field — the state property carries the status.
      Available on repository, organization, and app webhooks.
    messages:
      statusMessage:
        $ref: '#/components/messages/StatusMessage'
    bindings:
      http:
        method: POST

  workflowDispatch:
    address: /
    description: |
      Fired when a GitHub Actions workflow is manually triggered via the
      workflow_dispatch event. Available on app webhooks.
    messages:
      workflowDispatchMessage:
        $ref: '#/components/messages/WorkflowDispatchMessage'
    bindings:
      http:
        method: POST

  pullRequestReviewThread:
    address: /
    description: |
      Fired when a comment thread on a pull request is marked as resolved or
      unresolved. Actions: resolved, unresolved. Available on repository,
      organization, and app webhooks.
    messages:
      pullRequestReviewThreadResolved:
        $ref: '#/components/messages/PullRequestReviewThreadResolvedMessage'
      pullRequestReviewThreadUnresolved:
        $ref: '#/components/messages/PullRequestReviewThreadUnresolvedMessage'
    bindings:
      http:
        method: POST

  team:
    address: /
    description: |
      Fired when there is activity relating to teams in an organization.
      Actions: added_to_repository, created, deleted, edited,
      removed_from_repository. Available on organization, business, and app
      webhooks.
    messages:
      teamAddedToRepository:
        $ref: '#/components/messages/TeamAddedToRepositoryMessage'
      teamCreated:
        $ref: '#/components/messages/TeamCreatedMessage'
      teamDeleted:
        $ref: '#/components/messages/TeamDeletedMessage'
      teamEdited:
        $ref: '#/components/messages/TeamEditedMessage'
      teamRemovedFromRepository:
        $ref: '#/components/messages/TeamRemovedFromRepositoryMessage'
    bindings:
      http:
        method: POST

  organization:
    address: /
    description: |
      Fired when there is activity relating to an organization and its members.
      Actions: deleted, member_added, member_invited, member_removed, renamed.
      Available on organization, business, and app webhooks.
    messages:
      organizationDeleted:
        $ref: '#/components/messages/OrganizationDeletedMessage'
      organizationMemberAdded:
        $ref: '#/components/messages/OrganizationMemberAddedMessage'
      organizationMemberInvited:
        $ref: '#/components/messages/OrganizationMemberInvitedMessage'
      organizationMemberRemoved:
        $ref: '#/components/messages/OrganizationMemberRemovedMessage'
      organizationRenamed:
        $ref: '#/components/messages/OrganizationRenamedMessage'
    bindings:
      http:
        method: POST

  deploymentProtectionRule:
    address: /
    description: |
      Fired when a deployment protection rule is requested for an environment.
      Available on app webhooks only.
    messages:
      deploymentProtectionRuleMessage:
        $ref: '#/components/messages/DeploymentProtectionRuleMessage'
    bindings:
      http:
        method: POST

  deploymentReview:
    address: /
    description: |
      Fired when a deployment review is requested, approved, or rejected.
      Actions: approved, rejected, requested. Available on organization and
      app webhooks.
    messages:
      deploymentReviewApproved:
        $ref: '#/components/messages/DeploymentReviewApprovedMessage'
      deploymentReviewRejected:
        $ref: '#/components/messages/DeploymentReviewRejectedMessage'
      deploymentReviewRequested:
        $ref: '#/components/messages/DeploymentReviewRequestedMessage'
    bindings:
      http:
        method: POST

  installationTarget:
    address: /
    description: |
      Fired when there is activity on the account where a GitHub App is
      installed. Action: renamed. Available on app webhooks only.
    messages:
      installationTargetMessage:
        $ref: '#/components/messages/InstallationTargetMessage'
    bindings:
      http:
        method: POST

  issueDependencies:
    address: /
    description: |
      Fired when there is activity relating to issue dependencies. Actions:
      blocked_by_added, blocked_by_removed, blocking_added, blocking_removed.
      Available on repository, organization, and app webhooks.
    messages:
      issueDependenciesBlockedByAdded:
        $ref: '#/components/messages/IssueDependenciesBlockedByAddedMessage'
      issueDependenciesBlockedByRemoved:
        $ref: '#/components/messages/IssueDependenciesBlockedByRemovedMessage'
      issueDependenciesBlockingAdded:
        $ref: '#/components/messages/IssueDependenciesBlockingAddedMessage'
      issueDependenciesBlockingRemoved:
        $ref: '#/components/messages/IssueDependenciesBlockingRemovedMessage'
    bindings:
      http:
        method: POST

  marketplacePurchase:
    address: /
    description: |
      Fired when there is activity on a GitHub Marketplace purchase.
      Actions: cancelled, changed, pending_change, pending_change_cancelled,
      purchased. Available on app webhooks only (GitHub Marketplace).
    messages:
      marketplacePurchaseCancelled:
        $ref: '#/components/messages/MarketplacePurchaseCancelledMessage'
      marketplacePurchaseChanged:
        $ref: '#/components/messages/MarketplacePurchaseChangedMessage'
      marketplacePurchasePendingChange:
        $ref: '#/components/messages/MarketplacePurchasePendingChangeMessage'
      marketplacePurchasePendingChangeCancelled:
        $ref: '#/components/messages/MarketplacePurchasePendingChangeCancelledMessage'
      marketplacePurchasePurchased:
        $ref: '#/components/messages/MarketplacePurchasePurchasedMessage'
    bindings:
      http:
        method: POST

  personalAccessTokenRequest:
    address: /
    description: |
      Fired when a fine-grained personal access token request is created,
      approved, denied, or cancelled. Actions: approved, cancelled, created,
      denied. Available on organization webhooks only.
    messages:
      personalAccessTokenRequestApproved:
        $ref: '#/components/messages/PersonalAccessTokenRequestApprovedMessage'
      personalAccessTokenRequestCancelled:
        $ref: '#/components/messages/PersonalAccessTokenRequestCancelledMessage'
      personalAccessTokenRequestCreated:
        $ref: '#/components/messages/PersonalAccessTokenRequestCreatedMessage'
      personalAccessTokenRequestDenied:
        $ref: '#/components/messages/PersonalAccessTokenRequestDeniedMessage'
    bindings:
      http:
        method: POST

  project:
    address: /
    description: |
      Fired when there is activity on a classic project board. Actions:
      closed, created, deleted, edited, reopened. Available on repository,
      organization, and app webhooks. Note: classic Projects are deprecated.
    messages:
      projectClosed:
        $ref: '#/components/messages/ProjectClosedMessage'
      projectCreated:
        $ref: '#/components/messages/ProjectCreatedMessage'
      projectDeleted:
        $ref: '#/components/messages/ProjectDeletedMessage'
      projectEdited:
        $ref: '#/components/messages/ProjectEditedMessage'
      projectReopened:
        $ref: '#/components/messages/ProjectReopenedMessage'
    bindings:
      http:
        method: POST

  projectCard:
    address: /
    description: |
      Fired when there is activity on a classic project card. Actions:
      converted, created, deleted, edited, moved. Available on repository,
      organization, and app webhooks. Note: classic Projects are deprecated.
    messages:
      projectCardConverted:
        $ref: '#/components/messages/ProjectCardConvertedMessage'
      projectCardCreated:
        $ref: '#/components/messages/ProjectCardCreatedMessage'
      projectCardDeleted:
        $ref: '#/components/messages/ProjectCardDeletedMessage'
      projectCardEdited:
        $ref: '#/components/messages/ProjectCardEditedMessage'
      projectCardMoved:
        $ref: '#/components/messages/ProjectCardMovedMessage'
    bindings:
      http:
        method: POST

  projectColumn:
    address: /
    description: |
      Fired when there is activity on a classic project column. Actions:
      created, deleted, edited, moved. Available on repository, organization,
      and app webhooks. Note: classic Projects are deprecated.
    messages:
      projectColumnCreated:
        $ref: '#/components/messages/ProjectColumnCreatedMessage'
      projectColumnDeleted:
        $ref: '#/components/messages/ProjectColumnDeletedMessage'
      projectColumnEdited:
        $ref: '#/components/messages/ProjectColumnEditedMessage'
      projectColumnMoved:
        $ref: '#/components/messages/ProjectColumnMovedMessage'
    bindings:
      http:
        method: POST

  repositoryImport:
    address: /
    description: |
      Fired when a repository import finishes on GitHub.com. No action field.
      Available on repository and organization webhooks.
    messages:
      repositoryImportMessage:
        $ref: '#/components/messages/RepositoryImportMessage'
    bindings:
      http:
        method: POST

  subIssues:
    address: /
    description: |
      Fired when there is activity relating to sub-issues. Actions:
