            - created
            - fixed
            - reopened
            - reopened_by_user
            - updated_assignment
        alert:
          type: object
          description: The code scanning alert involved in the event
          required:
            - number
            - state
          properties:
            number:
              type: integer
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
              nullable: true
            url:
              type: string
              format: uri
            html_url:
              type: string
              format: uri
            state:
              type: string
              enum:
                - open
                - closed
                - dismissed
                - fixed
            fixed_at:
              type: string
              format: date-time
              nullable: true
            dismissed_by:
              $ref: '#/components/schemas/User'
              nullable: true
            dismissed_at:
              type: string
              format: date-time
              nullable: true
