# ---------------------------------------------------------------------------
# Operations — one receive operation per channel/event type
# ---------------------------------------------------------------------------
operations:

  onPing:
    action: receive
    channel:
      $ref: '#/channels/ping'
    summary: Receive a ping confirmation for a newly created webhook
    messages:
      - $ref: '#/channels/ping/messages/pingMessage'

  onPush:
    action: receive
    channel:
      $ref: '#/channels/push'
    summary: Receive a push event when commits or refs are pushed
    messages:
      - $ref: '#/channels/push/messages/pushMessage'

  onPullRequest:
    action: receive
    channel:
      $ref: '#/channels/pullRequest'
    summary: Receive pull request activity events
    messages:
      - $ref: '#/channels/pullRequest/messages/pullRequestAssigned'
      - $ref: '#/channels/pullRequest/messages/pullRequestAutoMergeDisabled'
      - $ref: '#/channels/pullRequest/messages/pullRequestAutoMergeEnabled'
      - $ref: '#/channels/pullRequest/messages/pullRequestClosed'
      - $ref: '#/channels/pullRequest/messages/pullRequestConvertedToDraft'
      - $ref: '#/channels/pullRequest/messages/pullRequestDemilestoned'
      - $ref: '#/channels/pullRequest/messages/pullRequestDequeued'
      - $ref: '#/channels/pullRequest/messages/pullRequestEdited'
      - $ref: '#/channels/pullRequest/messages/pullRequestEnqueued'
      - $ref: '#/channels/pullRequest/messages/pullRequestLabeled'
      - $ref: '#/channels/pullRequest/messages/pullRequestLocked'
      - $ref: '#/channels/pullRequest/messages/pullRequestMilestoned'
      - $ref: '#/channels/pullRequest/messages/pullRequestOpened'
      - $ref: '#/channels/pullRequest/messages/pullRequestReadyForReview'
      - $ref: '#/channels/pullRequest/messages/pullRequestReopened'
      - $ref: '#/channels/pullRequest/messages/pullRequestReviewRequestRemoved'
      - $ref: '#/channels/pullRequest/messages/pullRequestReviewRequested'
      - $ref: '#/channels/pullRequest/messages/pullRequestSynchronize'
      - $ref: '#/channels/pullRequest/messages/pullRequestUnassigned'
      - $ref: '#/channels/pullRequest/messages/pullRequestUnlabeled'
      - $ref: '#/channels/pullRequest/messages/pullRequestUnlocked'
  onIssues:
    action: receive
    channel:
      $ref: '#/channels/issues'
    summary: Receive issue activity events
    messages:
      - $ref: '#/channels/issues/messages/issuesAssigned'
      - $ref: '#/channels/issues/messages/issuesClosed'
      - $ref: '#/channels/issues/messages/issuesDeleted'
      - $ref: '#/channels/issues/messages/issuesDemilestoned'
      - $ref: '#/channels/issues/messages/issuesEdited'
      - $ref: '#/channels/issues/messages/issuesLabeled'
      - $ref: '#/channels/issues/messages/issuesLocked'
      - $ref: '#/channels/issues/messages/issuesMilestoned'
      - $ref: '#/channels/issues/messages/issuesOpened'
      - $ref: '#/channels/issues/messages/issuesPinned'
      - $ref: '#/channels/issues/messages/issuesReopened'
      - $ref: '#/channels/issues/messages/issuesTransferred'
      - $ref: '#/channels/issues/messages/issuesTyped'
      - $ref: '#/channels/issues/messages/issuesUnassigned'
      - $ref: '#/channels/issues/messages/issuesUnlabeled'
      - $ref: '#/channels/issues/messages/issuesUnlocked'
      - $ref: '#/channels/issues/messages/issuesUnpinned'
      - $ref: '#/channels/issues/messages/issuesUntyped'
  onRelease:
    action: receive
    channel:
      $ref: '#/channels/release'
    summary: Receive release activity events
    messages:
      - $ref: '#/channels/release/messages/releaseCreated'
      - $ref: '#/channels/release/messages/releaseDeleted'
      - $ref: '#/channels/release/messages/releaseEdited'
      - $ref: '#/channels/release/messages/releasePrereleased'
      - $ref: '#/channels/release/messages/releasePublished'
      - $ref: '#/channels/release/messages/releaseReleased'
      - $ref: '#/channels/release/messages/releaseUnpublished'
  onIssueComment:
    action: receive
    channel:
      $ref: '#/channels/issueComment'
    summary: Receive issue or pull request comment events
    messages:
      - $ref: '#/channels/issueComment/messages/issueCommentCreated'
      - $ref: '#/channels/issueComment/messages/issueCommentDeleted'
      - $ref: '#/channels/issueComment/messages/issueCommentEdited'
      - $ref: '#/channels/issueComment/messages/issueCommentPinned'
      - $ref: '#/channels/issueComment/messages/issueCommentUnpinned'
  onPullRequestReview:
    action: receive
    channel:
      $ref: '#/channels/pullRequestReview'
    summary: Receive pull request review events
    messages:
      - $ref: '#/channels/pullRequestReview/messages/pullRequestReviewDismissed'
      - $ref: '#/channels/pullRequestReview/messages/pullRequestReviewEdited'
      - $ref: '#/channels/pullRequestReview/messages/pullRequestReviewSubmitted'
  onPullRequestReviewComment:
    action: receive
    channel:
      $ref: '#/channels/pullRequestReviewComment'
    summary: Receive pull request diff comment events
    messages:
      - $ref: '#/channels/pullRequestReviewComment/messages/pullRequestReviewCommentCreated'
      - $ref: '#/channels/pullRequestReviewComment/messages/pullRequestReviewCommentDeleted'
