    # Event payload schemas
    # -----------------------------------------------------------------------

    PingPayload:
      type: object
      description: Payload for the ping event
      properties:
        zen:
          type: string
          description: Random string of GitHub zen
        hook_id:
          type: integer
          description: The ID of the webhook that triggered the ping
        hook:
          type: object
          description: The webhook that is being pinged
          properties:
            type:
              type: string
              enum:
                - Repository
                - Organization
                - App
                - Business
                - Marketplace
            id:
              type: integer
            name:
              type: string
            active:
              type: boolean
            events:
              type: array
              items:
                type: string
            config:
              type: object
              properties:
                content_type:
                  type: string
                  enum:
                    - json
                    - form
                insecure_ssl:
                  type: string
                url:
                  type: string
                  format: uri
            updated_at:
              type: string
              format: date-time
            created_at:
              type: string
              format: date-time
            url:
              type: string
              format: uri
        sender:
          $ref: '#/components/schemas/User'
        repository:
          $ref: '#/components/schemas/Repository'
        organization:
          $ref: '#/components/schemas/Organization'

    PushPayload:
      type: object
      description: Payload for the push event
      required:
        - ref
        - before
        - after
        - created
        - deleted
        - forced
        - commits
        - compare
        - pusher
        - sender
        - repository
      properties:
        ref:
          type: string
          description: The full git ref that was pushed (e.g. refs/heads/main or refs/tags/v3.14.1)
        before:
          type: string
          description: The SHA of the most recent commit on ref before the push
        after:
          type: string
          description: The SHA of the most recent commit on ref after the push
        base_ref:
          type: string
          nullable: true
          description: The base ref for the push (if applicable)
        created:
          type: boolean
          description: Whether this push created the ref
        deleted:
          type: boolean
          description: Whether this push deleted the ref
        forced:
          type: boolean
          description: Whether this push was a force push of the ref
        compare:
          type: string
          description: URL showing the changes in this ref update
        commits:
          type: array
          description: Array of commit objects (maximum 2048)
          items:
            $ref: '#/components/schemas/Commit'
        head_commit:
          $ref: '#/components/schemas/Commit'
          nullable: true
        pusher:
          $ref: '#/components/schemas/CommitAuthor'
          description: Metaproperties for the Git author/committer
        sender:
          $ref: '#/components/schemas/User'
        repository:
          $ref: '#/components/schemas/Repository'
        organization:
          $ref: '#/components/schemas/Organization'
        installation:
          $ref: '#/components/schemas/Installation'
        enterprise:
          $ref: '#/components/schemas/Enterprise'

