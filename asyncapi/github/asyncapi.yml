components:

  # -------------------------------------------------------------------------
  # Messages
  # -------------------------------------------------------------------------
  messages:

    PingMessage:
      name: ping
      title: Ping Event
      summary: Confirmation that a webhook was configured correctly
      x-ballerina-event-type: "ping"
      headers:
        $ref: '#/components/schemas/WebhookHeaders'
      payload:
        $ref: '#/components/schemas/PingPayload'

    PushMessage:
      name: push
      title: Push Event
      summary: A commit, branch, or tag was pushed to a repository
      x-ballerina-event-type: "push"
      headers:
        $ref: '#/components/schemas/WebhookHeaders'
      payload:
        $ref: '#/components/schemas/PushPayload'

    PullRequestAssignedMessage:
      name: pull_request
      title: Pull Request Assigned
      summary: Activity on a pull request
      x-ballerina-event-type: "pull_request_assigned"
      headers:
        $ref: '#/components/schemas/WebhookHeaders'
      payload:
        $ref: '#/components/schemas/PullRequestPayload'
