      $ref: '#/channels/watch'
    summary: Receive repository watch events
    messages:
      - $ref: '#/channels/watch/messages/watchMessage'

  onCheckRun:
    action: receive
    channel:
      $ref: '#/channels/checkRun'
    summary: Receive check run activity events
    messages:
      - $ref: '#/channels/checkRun/messages/checkRunCompleted'
