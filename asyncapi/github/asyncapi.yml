          format: uri
        html_url:
          type: string
          format: uri
        members_url:
          type: string
        repositories_url:
          type: string
          format: uri
        parent:
          type: object
          nullable: true

    # -----------------------------------------------------------------------
    # Batch 2 event payload schemas
    # -----------------------------------------------------------------------

    DiscussionPayload:
      type: object
      description: Payload for discussion events
      required:
        - action
        - discussion
      properties:
        action:
          type: string
          enum:
            - answered
            - category_changed
            - closed
            - created
            - deleted
            - edited
            - labeled
            - locked
            - pinned
            - reopened
            - transferred
            - unanswered
            - unlabeled
            - unlocked
            - unpinned
        discussion:
          $ref: '#/components/schemas/Discussion'
        answer:
          type: object
          description: Present on answered action — the comment marked as answer
          nullable: true
        label:
          $ref: '#/components/schemas/Label'
        changes:
          type: object
          description: For edited/category_changed events, the changes made
        sender:
          $ref: '#/components/schemas/User'
        repository:
          $ref: '#/components/schemas/Repository'
        organization:
          $ref: '#/components/schemas/Organization'
        installation:
          $ref: '#/components/schemas/Installation'
        enterprise:
          $ref: '#/components/schemas/Enterprise'

    DiscussionCommentPayload:
      type: object
      description: Payload for discussion_comment events
      required:
        - action
        - comment
        - discussion
      properties:
        action:
          type: string
          enum:
            - created
            - deleted
            - edited
        comment:
          type: object
          description: The discussion comment
          properties:
            id:
              type: integer
            node_id:
              type: string
            html_url:
              type: string
              format: uri
            body:
              type: string
            user:
              $ref: '#/components/schemas/User'
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
            author_association:
              type: string
        discussion:
          $ref: '#/components/schemas/Discussion'
        changes:
          type: object
          description: For edited events, the changes to the comment
        sender:
          $ref: '#/components/schemas/User'
        repository:
          $ref: '#/components/schemas/Repository'
        organization:
          $ref: '#/components/schemas/Organization'
        installation:
          $ref: '#/components/schemas/Installation'
        enterprise:
          $ref: '#/components/schemas/Enterprise'

    LabelPayload:
      type: object
      description: Payload for label events
      required:
        - action
        - label
        - sender
        - repository
      properties:
        action:
          type: string
          enum:
            - created
            - deleted
            - edited
        label:
          $ref: '#/components/schemas/Label'
        changes:
          type: object
          description: For edited events, the changes to the label
          properties:
            color:
              type: object
              properties:
                from:
                  type: string
            name:
              type: object
              properties:
                from:
                  type: string
            description:
              type: object
              properties:
                from:
                  type: string
        sender:
          $ref: '#/components/schemas/User'
        repository:
          $ref: '#/components/schemas/Repository'
        organization:
          $ref: '#/components/schemas/Organization'
        installation:
          $ref: '#/components/schemas/Installation'
        enterprise:
          $ref: '#/components/schemas/Enterprise'

    MilestonePayload:
      type: object
      description: Payload for milestone events
      required:
        - action
        - milestone
        - sender
        - repository
      properties:
        action:
          type: string
          enum:
            - closed
            - created
            - deleted
            - edited
            - opened
        milestone:
          $ref: '#/components/schemas/Milestone'
        changes:
          type: object
          description: For edited events, the changes to the milestone
          properties:
            description:
              type: object
              properties:
                from:
                  type: string
            due_on:
              type: object
              properties:
                from:
                  type: string
                  format: date-time
                  nullable: true
            title:
              type: object
              properties:
                from:
                  type: string
        sender:
          $ref: '#/components/schemas/User'
        repository:
          $ref: '#/components/schemas/Repository'
        organization:
          $ref: '#/components/schemas/Organization'
        installation:
          $ref: '#/components/schemas/Installation'
        enterprise:
          $ref: '#/components/schemas/Enterprise'

    StatusPayload:
      type: object
      description: |
        Payload for status events. No action field — the state property carries
        the status (pending, success, failure, error).
      required:
        - id
        - sha
        - name
        - state
        - context
        - created_at
        - updated_at
        - commit
        - branches
      properties:
        id:
          type: integer
          description: The unique identifier of the status
        sha:
          type: string
          description: The commit SHA
        name:
          type: string
          description: The repository name
        state:
          type: string
          description: The new state of the commit status
          enum:
            - error
            - failure
            - pending
            - success
        context:
          type: string
          description: The status context identifier
        description:
          type: string
          nullable: true
          description: The optional human-readable description
        target_url:
          type: string
          nullable: true
          description: The optional link added to the status
        avatar_url:
          type: string
          nullable: true
        commit:
          type: object
          description: The commit the status is associated with
          properties:
            sha:
              type: string
            commit:
              type: object
            url:
              type: string
              format: uri
            html_url:
              type: string
              format: uri
            author:
              $ref: '#/components/schemas/User'
            committer:
              $ref: '#/components/schemas/User'
        branches:
          type: array
          description: Array of branches containing the status SHA (max 10)
          items:
            type: object
            properties:
              name:
                type: string
              commit:
                type: object
                properties:
                  sha:
                    type: string
                  url:
                    type: string
                    format: uri
              protected:
                type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        sender:
          $ref: '#/components/schemas/User'
        repository:
          $ref: '#/components/schemas/Repository'
        organization:
          $ref: '#/components/schemas/Organization'
        installation:
          $ref: '#/components/schemas/Installation'
        enterprise:
          $ref: '#/components/schemas/Enterprise'

    WorkflowDispatchPayload:
      type: object
      description: Payload for workflow_dispatch events (manually triggered workflows)
      required:
        - ref
        - workflow
      properties:
        inputs:
          type: object
          nullable: true
          description: The inputs provided when manually triggering the workflow
          additionalProperties: true
        ref:
          type: string
          description: The branch or tag ref from which the workflow was triggered
        workflow:
          type: string
          description: The path to the workflow file (e.g. .github/workflows/main.yml)
        sender:
          $ref: '#/components/schemas/User'
        repository:
          $ref: '#/components/schemas/Repository'
        organization:
          $ref: '#/components/schemas/Organization'
        installation:
          $ref: '#/components/schemas/Installation'
        enterprise:
          $ref: '#/components/schemas/Enterprise'

    PullRequestReviewThreadPayload:
      type: object
      description: Payload for pull_request_review_thread events
      required:
        - action
        - pull_request
        - thread
      properties:
        action:
          type: string
          enum:
            - resolved
            - unresolved
        pull_request:
          $ref: '#/components/schemas/PullRequest'
        thread:
          type: object
          description: The review thread that was resolved or unresolved
          properties:
            node_id:
              type: string
            comments:
              type: array
              items:
                $ref: '#/components/schemas/PullRequestReviewComment'
        updated_at:
          type: string
          format: date-time
          nullable: true
        sender:
          $ref: '#/components/schemas/User'
        repository:
          $ref: '#/components/schemas/Repository'
        organization:
          $ref: '#/components/schemas/Organization'
        installation:
          $ref: '#/components/schemas/Installation'
        enterprise:
          $ref: '#/components/schemas/Enterprise'

    TeamPayload:
      type: object
      description: Payload for team events
      required:
        - action
        - team
      properties:
        action:
          type: string
          enum:
            - added_to_repository
            - created
            - deleted
            - edited
            - removed_from_repository
        team:
          $ref: '#/components/schemas/Team'
        changes:
          type: object
          description: For edited events, the changes to the team
          properties:
            description:
              type: object
              properties:
                from:
                  type: string
            name:
              type: object
              properties:
                from:
                  type: string
            privacy:
              type: object
              properties:
                from:
                  type: string
            notification_setting:
              type: object
              properties:
                from:
                  type: string
            repository:
              type: object
              description: For added_to_repository/removed_from_repository events
        repository:
          $ref: '#/components/schemas/Repository'
          description: Present for added_to_repository and removed_from_repository actions
        sender:
          $ref: '#/components/schemas/User'
        organization:
          $ref: '#/components/schemas/Organization'
        installation:
          $ref: '#/components/schemas/Installation'
        enterprise:
          $ref: '#/components/schemas/Enterprise'

    OrganizationPayload:
      type: object
      description: Payload for organization events
      required:
        - action
      properties:
        action:
          type: string
          enum:
            - deleted
            - member_added
            - member_invited
            - member_removed
            - renamed
        membership:
          type: object
          description: |
            The membership between the user and the organization.
            Not present when the action is member_invited.
          nullable: true
          properties:
            url:
              type: string
              format: uri
            state:
              type: string
              enum:
                - active
                - pending
            role:
              type: string
              enum:
                - admin
                - member
                - billing_manager
            organization_url:
              type: string
              format: uri
            user:
              $ref: '#/components/schemas/User'
        invitation:
          type: object
          nullable: true
          description: Present when action is member_invited
        changes:
          type: object
          nullable: true
          description: For renamed events, the old and new organization name
        sender:
          $ref: '#/components/schemas/User'
        organization:
          $ref: '#/components/schemas/Organization'
        installation:
          $ref: '#/components/schemas/Installation'
        enterprise:
          $ref: '#/components/schemas/Enterprise'

    DeploymentProtectionRulePayload:
      type: object
      description: Payload for deployment_protection_rule events (app webhooks only)
      properties:
        environment:
          type: string
          description: The name of the environment that has the deployment protection rule
        event:
          type: string
          description: The event that triggered the deployment protection rule
        sha:
          type: string
          description: The commit SHA that triggered the workflow
        ref:
          type: string
          description: The branch or tag ref that triggered the workflow
        deployment_callback_url:
          type: string
          format: uri
          description: The URL to call to approve or reject the deployment
        deployment:
          $ref: '#/components/schemas/Deployment'
          description: A request for a specific ref to be deployed
        pull_requests:
          type: array
          description: The pull requests associated with the deployment
          items:
            type: object
            properties:
              number:
                type: integer
              url:
                type: string
                format: uri
              head:
                $ref: '#/components/schemas/PullRequestRef'
              base:
                $ref: '#/components/schemas/PullRequestRef'
        sender:
          $ref: '#/components/schemas/User'
        installation:
          $ref: '#/components/schemas/Installation'
        repository:
          $ref: '#/components/schemas/Repository'
        organization:
          $ref: '#/components/schemas/Organization'

    # -----------------------------------------------------------------------
    # Batch 3 event payload schemas
    # -----------------------------------------------------------------------

    CommitCommentPayload:
      type: object
      description: Payload for commit_comment events
      required:
        - action
        - comment
      properties:
        action:
          type: string
          enum:
            - created
        comment:
          type: object
          description: The commit comment resource
          required:
            - id
            - body
          properties:
            id:
              type: integer
            node_id:
              type: string
            url:
              type: string
              format: uri
            html_url:
              type: string
              format: uri
            body:
              type: string
            path:
              type: string
              nullable: true
              description: The relative path of the file being commented on
            position:
              type: integer
              nullable: true
              description: The line index in the diff
            line:
              type: integer
              nullable: true
              description: The line of the blob the comment refers to
            commit_id:
              type: string
            user:
              $ref: '#/components/schemas/User'
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
            author_association:
              type: string
        sender:
          $ref: '#/components/schemas/User'
        repository:
          $ref: '#/components/schemas/Repository'
        organization:
          $ref: '#/components/schemas/Organization'
        installation:
          $ref: '#/components/schemas/Installation'
        enterprise:
          $ref: '#/components/schemas/Enterprise'

    DependabotAlertPayload:
      type: object
      description: Payload for dependabot_alert events
      required:
        - action
        - alert
      properties:
        action:
          type: string
          enum:
            - assignees_changed
            - auto_dismissed
            - auto_reopened
            - created
            - dismissed
            - fixed
            - reintroduced
            - reopened
        alert:
          type: object
          description: A Dependabot alert
          required:
            - number
            - state
          properties:
            number:
              type: integer
            state:
              type: string
              enum:
                - auto_dismissed
                - dismissed
                - fixed
                - open
            dependency:
              type: object
              properties:
                package:
                  type: object
                  properties:
                    ecosystem:
                      type: string
                    name:
                      type: string
                manifest_path:
                  type: string
                scope:
                  type: string
                  enum:
                    - development
                    - runtime
                  nullable: true
            security_advisory:
              type: object
              properties:
                ghsa_id:
                  type: string
                cve_id:
                  type: string
                  nullable: true
                summary:
                  type: string
                description:
                  type: string
                severity:
                  type: string
                  enum:
                    - low
                    - medium
                    - high
                    - critical
                vulnerabilities:
                  type: array
                  items:
                    type: object
            security_vulnerability:
              type: object
              properties:
                package:
                  type: object
                severity:
                  type: string
                vulnerable_version_range:
                  type: string
                first_patched_version:
                  type: object
                  nullable: true
                  properties:
                    identifier:
                      type: string
            url:
              type: string
              format: uri
            html_url:
              type: string
              format: uri
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
            dismissed_at:
              type: string
              format: date-time
              nullable: true
            dismissed_by:
              $ref: '#/components/schemas/User'
              nullable: true
            dismissed_reason:
              type: string
              nullable: true
            dismissed_comment:
              type: string
              nullable: true
            fixed_at:
              type: string
              format: date-time
              nullable: true
            auto_dismissed_at:
              type: string
              format: date-time
              nullable: true
            assignees:
              type: array
              items:
                $ref: '#/components/schemas/User'
        sender:
          $ref: '#/components/schemas/User'
        repository:
          $ref: '#/components/schemas/Repository'
        organization:
          $ref: '#/components/schemas/Organization'
        installation:
          $ref: '#/components/schemas/Installation'
        enterprise:
          $ref: '#/components/schemas/Enterprise'

    GollumPayload:
      type: object
      description: Payload for gollum (wiki) events
      required:
        - pages
      properties:
        pages:
          type: array
          description: The pages that were updated
          items:
            type: object
            required:
              - page_name
              - title
              - action
              - sha
              - html_url
            properties:
              page_name:
                type: string
                description: The name of the page
              title:
                type: string
                description: The current page title
              summary:
                type: string
                nullable: true
                description: A summary of the changes
              action:
                type: string
                enum:
                  - created
                  - edited
              sha:
                type: string
                description: The latest commit SHA of the page
              html_url:
                type: string
                format: uri
        sender:
          $ref: '#/components/schemas/User'
        repository:
          $ref: '#/components/schemas/Repository'
        organization:
          $ref: '#/components/schemas/Organization'
        installation:
          $ref: '#/components/schemas/Installation'
        enterprise:
          $ref: '#/components/schemas/Enterprise'

    InstallationPayload:
      type: object
      description: Payload for installation events
      required:
        - action
        - installation
      properties:
        action:
          type: string
          enum:
            - created
            - deleted
            - new_permissions_accepted
            - suspend
            - unsuspend
        installation:
          $ref: '#/components/schemas/Installation'
        repositories:
          type: array
          description: An array of repositories the installation can access
          items:
            type: object
            properties:
              id:
                type: integer
              node_id:
                type: string
              name:
                type: string
              full_name:
                type: string
              private:
                type: boolean
        requester:
          $ref: '#/components/schemas/User'
          nullable: true
        sender:
          $ref: '#/components/schemas/User'
        organization:
          $ref: '#/components/schemas/Organization'
        enterprise:
          $ref: '#/components/schemas/Enterprise'

    InstallationRepositoriesPayload:
      type: object
      description: Payload for installation_repositories events
      required:
        - action
        - repositories_added
        - repositories_removed
        - repository_selection
        - requester
      properties:
        action:
          type: string
          enum:
            - added
            - removed
        repositories_added:
          type: array
          description: Repositories added to the installation
          items:
            type: object
            properties:
              id:
                type: integer
              node_id:
                type: string
              name:
                type: string
              full_name:
                type: string
              private:
                type: boolean
        repositories_removed:
          type: array
          description: Repositories removed from the installation
          items:
            type: object
            properties:
              id:
                type: integer
              node_id:
                type: string
              name:
                type: string
              full_name:
                type: string
              private:
                type: boolean
        repository_selection:
          type: string
          description: Whether all repositories or a selection are accessible
          enum:
            - all
            - selected
        requester:
          $ref: '#/components/schemas/User'
          nullable: true
        installation:
          $ref: '#/components/schemas/Installation'
        sender:
          $ref: '#/components/schemas/User'
        organization:
          $ref: '#/components/schemas/Organization'
        enterprise:
          $ref: '#/components/schemas/Enterprise'

    MembershipPayload:
      type: object
      description: Payload for membership events (team member added/removed)
      required:
        - action
        - member
        - scope
        - team
      properties:
        action:
          type: string
          enum:
            - added
            - removed
        member:
          $ref: '#/components/schemas/User'
          nullable: true
        scope:
          type: string
          description: The scope of the membership (currently always "team")
          enum:
            - team
        team:
          $ref: '#/components/schemas/Team'
        sender:
          $ref: '#/components/schemas/User'
        organization:
          $ref: '#/components/schemas/Organization'
        installation:
          $ref: '#/components/schemas/Installation'
        enterprise:
          $ref: '#/components/schemas/Enterprise'

    MergeGroupPayload:
      type: object
      description: Payload for merge_group events
      required:
        - action
        - merge_group
      properties:
        action:
          type: string
          enum:
            - checks_requested
            - destroyed
        merge_group:
          type: object
          description: A group of pull requests grouped together by the merge queue
          required:
            - head_sha
            - head_ref
            - base_sha
            - base_ref
          properties:
            head_sha:
              type: string
              description: The SHA of the merge group's head commit
            head_ref:
              type: string
              description: The full ref of the merge group targeting branch
            base_sha:
              type: string
              description: The SHA of the merge group's base branch
            base_ref:
              type: string
              description: The full ref of the branch being merged into
            head_commit:
              $ref: '#/components/schemas/Commit'
        reason:
          type: string
          description: For destroyed action, the reason the merge group was destroyed
          nullable: true
          enum:
            - dequeued
            - invalidated
            - merged
            - rejected
            - 
        sender:
          $ref: '#/components/schemas/User'
        repository:
          $ref: '#/components/schemas/Repository'
        organization:
          $ref: '#/components/schemas/Organization'
        installation:
          $ref: '#/components/schemas/Installation'
        enterprise:
          $ref: '#/components/schemas/Enterprise'

    PublicPayload:
      type: object
      description: |
        Payload for public events. Fired when a repository visibility changes
        from private to public. No action field.
      properties:
        sender:
          $ref: '#/components/schemas/User'
        repository:
          $ref: '#/components/schemas/Repository'
        organization:
          $ref: '#/components/schemas/Organization'
        installation:
          $ref: '#/components/schemas/Installation'
        enterprise:
          $ref: '#/components/schemas/Enterprise'

    RepositoryDispatchPayload:
      type: object
      description: |
        Payload for repository_dispatch events. The action field matches the
        event_type provided in the POST /repos/{owner}/{repo}/dispatches request.
      required:
        - action
        - branch
        - client_payload
      properties:
        action:
          type: string
          description: The event_type specified in the dispatch request body
        branch:
          type: string
          description: The branch from which the dispatch was triggered
        client_payload:
          type: object
          nullable: true
          description: The client_payload from the dispatch request body
          additionalProperties: true
        installation:
          $ref: '#/components/schemas/Installation'
        sender:
          $ref: '#/components/schemas/User'
        repository:
          $ref: '#/components/schemas/Repository'
        organization:
          $ref: '#/components/schemas/Organization'
        enterprise:
          $ref: '#/components/schemas/Enterprise'

    SecretScanningAlertPayload:
      type: object
      description: Payload for secret_scanning_alert events
      required:
        - action
        - alert
      properties:
        action:
          type: string
          enum:
            - assigned
